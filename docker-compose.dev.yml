version: '3.8'

services:
  api-dev:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./api:/app/api
    networks:
      - app-network
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  web-dev:
    build:
      context: .
      dockerfile: web/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ./web:/app/web
      - /app/web/node_modules
    depends_on:
      - api-dev
    networks:
      - app-network
    command: ["pnpm", "run", "dev"]

networks:
  app-network:
    driver: bridge
